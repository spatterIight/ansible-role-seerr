---
# Project source code URL: https://github.com/seerr-team/seerr

seerr_enabled: true

seerr_identifier: seerr
seerr_base_path: "{{ seerr_identifier }}"
seerr_data_path: "{{ seerr_base_path }}/data"

seerr_uid: ""
seerr_gid: ""

# The hostname at which Seerr is served.
seerr_hostname: ""

# The path at which Seerr is served.
# This value must either be `/` or not end with a slash (e.g. `/seerr`).
seerr_path_prefix: /

seerr_version: latest

seerr_arch: amd64

seerr_container_image: "{{ seerr_container_image_registry_prefix }}seerr-team/seerr:{{ seerr_container_image_tag }}"
seerr_container_image_tag: "{{ seerr_version }}"
seerr_container_image_registry_prefix: "{{ seerr_container_image_registry_prefix_upstream }}"
seerr_container_image_registry_prefix_upstream: "{{ seerr_container_image_registry_prefix_upstream_default }}"
seerr_container_image_registry_prefix_upstream_default: ghcr.io/
seerr_container_image_force_pull: "{{ seerr_container_image.endswith(':latest') }}"

# The base container network. It will be auto-created by this role if it doesn't exist already.
seerr_container_network: "{{ seerr_identifier }}"

# Control if the container network is deleted on uninstalling.
seerr_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `seerr_container_http_port`).
# Can be used to access the web UI directly (bypassing Traefik)
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:5055"), or empty string to not expose.
seerr_container_http_host_bind_port: ""

# The port number in the container for the web UI
seerr_container_http_port: 5055

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
seerr_container_additional_networks: "{{ (seerr_container_additional_networks_default + seerr_container_additional_networks_auto + seerr_container_additional_networks_custom) | unique }}"
seerr_container_additional_networks_default: []
seerr_container_additional_networks_auto: []
seerr_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
seerr_container_additional_volumes: "{{ seerr_container_additional_volumes_auto + seerr_container_additional_volumes_custom }}"
seerr_container_additional_volumes_auto: []
seerr_container_additional_volumes_custom: []

# seerr_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `seerr_container_labels_additional_labels_custom`.
seerr_container_labels_traefik_enabled: true
seerr_container_labels_traefik_docker_network: "{{ seerr_container_network }}"
seerr_container_labels_traefik_hostname: "{{ seerr_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/seerr`).
seerr_container_labels_traefik_path_prefix: "{{ seerr_path_prefix }}"
seerr_container_labels_traefik_rule: "Host(`{{ seerr_container_labels_traefik_hostname }}`){% if seerr_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ seerr_container_labels_traefik_path_prefix }}`){% endif %}"
seerr_container_labels_traefik_priority: 0
seerr_container_labels_traefik_entrypoints: web-secure
seerr_container_labels_traefik_tls: "{{ seerr_container_labels_traefik_entrypoints != 'web' }}"
seerr_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# seerr_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `seerr_container_labels_additional_labels_custom`
#
# Example:
# seerr_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
seerr_container_labels_additional_labels: "{{ seerr_container_labels_additional_labels_auto + seerr_container_labels_additional_labels_custom }}"
seerr_container_labels_additional_labels_auto: []
seerr_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
seerr_container_extra_arguments: "{{ seerr_container_extra_arguments_auto + seerr_container_extra_arguments_custom }}"
seerr_container_extra_arguments_auto: []
seerr_container_extra_arguments_custom: []

# List of systemd services that the Seerr systemd service depends on
seerr_systemd_required_services_list: "{{ (seerr_systemd_required_services_list_default + seerr_systemd_required_services_list_auto + seerr_systemd_required_services_list_custom) | unique }}"
seerr_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
seerr_systemd_required_services_list_auto: []
seerr_systemd_required_services_list_custom: []

# List of systemd services that the Seerr systemd service wants
seerr_systemd_wanted_services_list: "{{ (seerr_systemd_wanted_services_list_default + seerr_systemd_wanted_services_list_auto + seerr_systemd_wanted_services_list_custom) | unique }}"
seerr_systemd_wanted_services_list_default: []
seerr_systemd_wanted_services_list_auto: []
seerr_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
# Because `devture_systemd_docker_base_container_stop_grace_time_seconds` may be quite short and databases are more important to stop gracefully,
# we default to at least 30 seconds.
seerr_container_stop_grace_time_seconds: "{{ [devture_systemd_docker_base_container_stop_grace_time_seconds, 30] | max }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
seerr_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
seerr_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
seerr_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ seerr_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ seerr_container_stop_grace_time_seconds }} {{ seerr_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ seerr_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ seerr_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ seerr_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ seerr_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ seerr_identifier }} after {{ seerr_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone
seerr_environment_variables_tz: 'Etc/UTC'

# Specify the log level
seerr_environment_variables_log_level: debug

# seerr_environment_variables_additional_variables contains a multiline string with additional environment variables to pass to the container.
#
# Example:
# seerr_environment_variables_additional_variables: |
#   VAR=1
#   ANOTHER=value
seerr_environment_variables_additional_variables: ""

# seerr_restart_necessary controls whether the Seerr systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
seerr_restart_necessary: false
